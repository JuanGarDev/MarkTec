
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="general.css">
  <link rel="stylesheet" href="cajas.css">
  <link rel="stylesheet" href="botones.css">
  <link rel="stylesheet" href="categorias.css">


  <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <title>Teschi Market</title>
</head>


<header>
    <div class="contenedor cabecera">
        <div class="contenedor-anidado animate__animated animate__bounceInLeft">
            <h1>
                MARKE
            </h1>
        </div>
        <div>
            <h1 class="subcontenedor1 animate__animated animate__bounceInDown animate__delay-1s">
                T
            </h1>
        </div>
        <div>
            <h1 class="subcontenedor2 animate__animated animate__bounceInDown animate__delay-2s">
                E
            </h1>
        </div>
        <div>
            <h1 class="subcontenedor3 animate__animated animate__bounceInDown animate__delay-3s">
                C 
            </h1>
        </div>
    </div>
</header>


<body>

    <div id="presentacion" class="contenedor-img">
        <img id="logo-animado" src="img-MarkTec2.png" alt="Mascota Libélula TESCHI" class="imagen-ajustable animate__animated animate__pulse img-animacion">
    </div>

    <div id="barra-nav" class="contenedor cont-nav hidden">
        <form action="/buscar" method="GET" class="navegador">
            <input type="text" name="q" placeholder="Buscar productos, marcas y más..." required>
            <button type="submit" class="btn liquid">
            <i class="fa fa-search"></i> </button>
        </form>
    </div>


    <div id="categorias" class="contenedor catgo hidden">
        <div id="categorias1">

            <div id="Celulares" class="contenedor categ ">
                <h2>Celulares</h2>
            </div>
            <div id="Electronica y audio"></div>
                <h2>Electronica</h2>
            <div id="Herramientas"></div>
                <h2>Herramientas</h2>
            <div id="Libros"></div>
            <div id="Ropa y calzado"></div>

        </div>
        <div id="categorias2">

        </div>
    </div>
    










    <script src="ajustes.js"></script>
</body>
</html>
